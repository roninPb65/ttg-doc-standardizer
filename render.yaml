databases:
  - name: ttg-doc-standardizer-db
    plan: free
    databaseName: ttg_docs
    user: ttg
    region: oregon

services:
  # ---- Backend API (Docker, Express + Postgres) ----
  - type: web
    name: ttg-doc-standardizer-1
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /healthz
    envVars:
      - key: PORT
        value: "4000"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ttg-doc-standardizer-db
          property: connectionString
      # Free plan has no persistent disk, so rendered .docx files live on the
      # container's ephemeral filesystem and are lost on restart/redeploy.
      # Fine for light/demo use. Upgrade to a paid plan + `disk:` to persist them.
      - key: OUTPUT_DIR
        value: /data/outputs
      # Must exactly match the frontend's origin (no wildcard support in the
      # backend's cors() config, and Render's actual assigned name was
      # ttg-doc-standardizer-2 due to a name collision with the guessed name).
      - key: CORS_ORIGIN
        value: "https://ttg-doc-standardizer-2.onrender.com"
      # "heuristic" = pure-JS keyword routing, no model download, low memory.
      # Free web services have 512MB RAM, which is tight for the ONNX zero-shot
      # model. Switch to "transformers" if you upgrade to a paid plan.
      - key: STRUCTURER
        value: heuristic
      - key: MAX_UPLOAD_BYTES
        value: "15728640"

  # ---- Frontend (static site, built by Vite) ----
  - type: web
    name: ttg-doc-standardizer-2
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      # Baked into the JS bundle at build time. Must match the backend
      # service's actual onrender.com URL.
      - key: VITE_API_URL
        value: https://ttg-doc-standardizer-1.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
