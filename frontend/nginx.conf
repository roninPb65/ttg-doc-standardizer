server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy API calls to the backend service.
  # BACKEND_URL is templated at deploy time (k8s) or defaults to the compose service name.
  location /api/ {
    proxy_pass http://backend:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Forward the authenticated user (set by an upstream OIDC/Keycloak proxy).
    proxy_set_header X-User-Email $http_x_user_email;
    client_max_body_size 20m;
  }
}
