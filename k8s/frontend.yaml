apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: doc-standardizer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: REGISTRY/ttg-doc-standardizer-frontend:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: doc-standardizer
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 8080
