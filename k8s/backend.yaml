apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: doc-outputs
  namespace: doc-standardizer
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: doc-standardizer
spec:
  # Rendered files live on a ReadWriteOnce PVC, so keep to 1 replica unless you
  # switch to ReadWriteMany or object storage (see README).
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: REGISTRY/ttg-doc-standardizer-backend:latest
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
            - name: NODE_ENV
              value: production
            - name: OUTPUT_DIR
              value: /data/outputs
            - name: CORS_ORIGIN
              value: "*"
            # Local structuring — no API key. Model is baked into the image at build.
            - name: STRUCTURER
              value: transformers
            - name: ZEROSHOT_MODEL
              value: Xenova/nli-deberta-v3-xsmall
            - name: TRANSFORMERS_CACHE_DIR
              value: /models
            - name: TRANSFORMERS_OFFLINE
              value: "true"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: doc-standardizer-secrets
                  key: DATABASE_URL
          volumeMounts:
            - name: outputs
              mountPath: /data/outputs
          readinessProbe:
            httpGet:
              path: /readyz
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: outputs
          persistentVolumeClaim:
            claimName: doc-outputs
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: doc-standardizer
spec:
  selector:
    app: backend
  ports:
    - port: 4000
      targetPort: 4000
