# Copy to secrets.yaml, fill in real values, and apply. DO NOT commit secrets.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: doc-standardizer-secrets
  namespace: doc-standardizer
type: Opaque
stringData:
  # Postgres
  POSTGRES_USER: ttg
  POSTGRES_PASSWORD: change-me
  POSTGRES_DB: ttg_docs
  # Full connection string the backend uses (must match the three values above + the db service name)
  DATABASE_URL: postgres://ttg:change-me@postgres:5432/ttg_docs
